# ──────────────────────────────────────────────
#  czsh tmux configuration
# ──────────────────────────────────────────────

# ─── Prefix ──────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── General ─────────────────────────────────
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set  -g history-limit 50000
set  -g escape-time 0
set  -g focus-events on
set  -g mouse on
set  -g set-clipboard on
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g display-time 3000
set  -g display-panes-time 3000

# ─── Reload config ───────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ─── Window splitting ───────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ─── Pane navigation (vim-style) ────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane resizing ──────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window navigation ─────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# Move windows
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ─── Copy mode (vi) ─────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi C-v    send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# Clipboard integration — platform-aware
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
}

# ─── Status bar (minimal) ───────────────────
set  -g status on
set  -g status-interval 5
set  -g status-position bottom
set  -g status-justify left
set  -g status-style "fg=#a0a0a0,bg=#1a1a2e"

# Left: session name
set  -g status-left-length 30
set  -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#3b3b5c]│ "

# Right: date & time
set  -g status-right-length 50
set  -g status-right "#[fg=#3b3b5c]│ #[fg=#7aa2f7]%a %b %d #[fg=#3b3b5c]│ #[fg=#a0a0a0]%H:%M "

# Window tabs
setw -g window-status-format         "#[fg=#606080] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator      ""

# Pane borders
set  -g pane-border-style        "fg=#3b3b5c"
set  -g pane-active-border-style "fg=#7aa2f7"

# Messages
set  -g message-style "fg=#7aa2f7,bg=#1a1a2e,bold"

# ─── Plugins (TPM) ──────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Bootstrap TPM (ignore if not yet installed)
if-shell "test -d ~/.config/czsh/tmux/plugins/tpm" {
    run '~/.config/czsh/tmux/plugins/tpm/tpm'
}
